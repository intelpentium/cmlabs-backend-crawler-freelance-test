name: cmlabs-crawler-api

services:
  postgres:
    image: postgres:16-alpine
    container_name: cmlabs-crawler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crawler
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d crawler"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
